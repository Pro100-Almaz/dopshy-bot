#      - bot
#    restart: unless-stopped

#  certbot:
#    image: certbot/certbot:latest
#    volumes:
#      - certbot_certs:/etc/letsencrypt
#      - certbot_webroot:/var/www/certbot
#    # Obtain cert on first run (no-op if already valid), then renew every 12h
#    entrypoint: ["/bin/sh", "-c", "certbot certonly --webroot --webroot-path=/var/www/certbot --email admin@dopsy.kz --agree-tos --no-eff-email --non-interactive -d bot.dopsy.kz || true; while true; do sleep 12h; certbot renew --webroot --webroot-path=/var/www/certbot --quiet; done"]
#    depends_on:
#      - nginx
#    restart: unless-stopped

  # Directus admin panel — runs against the same Postgres as the bot.
  # First run will auto-create the directus_* system tables. Domain tables
  # (bookings, payments, fields, …) are added as collections via the UI.
  directus:
    image: directus/directus:11
    env_file:
      - .env
    environment:
      PORT: 8055           # override .env's PORT=5001 (which is the bot's Flask port)
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: dopshy
      DB_USER: dopshy
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      PUBLIC_URL: ${DIRECTUS_PUBLIC_URL:-http://localhost:8055}
      ADMIN_EMAIL: ${DIRECTUS_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${DIRECTUS_ADMIN_PASSWORD}
      WEBSOCKETS_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8055:8055"
    volumes:
      - directus_uploads:/directus/uploads
      - directus_extensions:/directus/extensions
    restart: unless-stopped

  # Run with: docker compose --profile ingest run --rm ingest
  ingest:
    build: .
    env_file:
      - .env
    volumes:
      - chroma_data:/app/chroma_db
      - ./documents:/app/documents:ro
    command: python scripts/ingest.py
    profiles:
      - ingest

volumes:
  chroma_data:
  bot_data:
  postgres_data:
  directus_uploads:
  directus_extensions:
#  certbot_certs:
