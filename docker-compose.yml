services:
  bot:
    build: .
    env_file:
      - .env
    volumes:
      - chroma_data:/app/chroma_db      # persistent vector DB
      - bot_data:/app/data              # persistent conversation history (SQLite)
      - ./documents:/app/documents:ro   # hot-reload docs without rebuild
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    ports:
      - "5000:5000"

