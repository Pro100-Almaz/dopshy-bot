server {
    listen 80;
    server_name bot.dopsy.kz;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bot.dopsy.kz;

    ssl_certificate     /etc/letsencrypt/live/bot.dopsy.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.dopsy.kz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Meta requires HTTPS for webhook delivery
    location /webhook {
        proxy_pass         http://bot:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /admin/ingest {
        proxy_pass         http://bot:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://bot:5000;
        access_log off;
    }

    # Block everything else
    location / {
        return 404;
    }
}
