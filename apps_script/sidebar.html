<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: Arial, sans-serif; font-size: 13px; padding: 8px; }
      label { display: block; margin-top: 10px; font-weight: bold; }
      input, select, textarea { width: 100%; box-sizing: border-box; padding: 5px; margin-top: 3px; }
      button { margin-top: 14px; padding: 8px 14px; cursor: pointer; }
      #msg { margin-top: 12px; padding: 8px; border-radius: 4px; display: none; }
      .ok { background: #e6f4ea; color: #137333; }
      .err { background: #fce8e6; color: #c5221f; }
    </style>
  </head>
  <body>
    <label>Поле</label>
    <select id="field"></select>

    <label>Повторить</label>
    <select id="repeat">
      <option value="none" selected>Нет</option>
      <option value="daily">Ежедневно</option>
      <option value="weekly">Еженедельно</option>
      <option value="monthly">Ежемесячно</option>
    </select>

    <label>Дата</label>
    <input type="date" id="date">

    <div id="endDateDiv" hidden>
      <label>Конечная дата</label>
      <input type="date" id="endDate">
    </div>

    <label>Начало</label>
    <input type="time" id="start" step="300">

    <label>Конец</label>
    <input type="time" id="end" step="300">

    <label>Имя клиента</label>
    <input type="text" id="customer">

    <label>Номер клиента</label>
    <input type="text" id="phone">

    <label>Примечание</label>
    <textarea id="notes" rows="2"></textarea>

    <label>Ожидание оплаты</label>
    <select id="reservedUntil">
      <option value="20">20мин</option>
      <option value="30" selected>30мин</option>
      <option value="60">1час</option>
      <option value="120">2час</option>
      <option value="180">3час</option>
    </select>


    <button id="submit" onclick="submit()">Создать бронь</button>
    <div id="msg"></div>

    <script>
      google.script.run.withSuccessHandler(function (opts) {
        var sel = document.getElementById('field');
        opts.forEach(function (o) {
          var el = document.createElement('option');
          el.value = o.id; el.textContent = o.label;
          sel.appendChild(el);
        });
      }).getFieldOptions();

      function show(ok, text) {
        var m = document.getElementById('msg');
        m.className = ok ? 'ok' : 'err';
        m.textContent = text;
        m.style.display = 'block';
      }

      function submit() {
        var form = {
          field: document.getElementById('field').value,
          date: document.getElementById('date').value,
          start: document.getElementById('start').value,
          end: document.getElementById('end').value,
          customer: document.getElementById('customer').value,
          phone: document.getElementById('phone').value,
          notes: document.getElementById('notes').value,
          repeat: document.getElementById('repeat').value,
          endDate: document.getElementById('endDate').value,
          reservedUntil: document.getElementById('reservedUntil').value,
        };
        if (!form.field || !form.date || !form.start || !form.end) {
          return show(false, 'Заполните поле, дату и время.');
        }
        if (form.end <= form.start) {
          return show(false, 'Конец должен быть позже начала.');
        }
        if (form.repeat !== 'none') {
            if (!form.endDate || !form.date || form.date >= form.endDate) {
                return show(false, 'Заполните даты правильно');
            }
        }
        const today = new Intl.DateTimeFormat('en-CA', {timeZone: 'Asia/Almaty'}).format(new Date());
        if (form.date < today) {
            return show(false, 'Дата не может быть в прошлом.');
        }

        const currentTime = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Asia/Almaty',
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        }).format(new Date());
        if (form.date === today && form.start < currentTime) {
            return show(false, 'Время начала не может быть в прошлом.');
        }

        document.getElementById('submit').disabled = true;
        google.script.run
          .withSuccessHandler(function (res) {
            document.getElementById('submit').disabled = false;
            show(res.ok, res.message);
          })
          .withFailureHandler(function (err) {
            document.getElementById('submit').disabled = false;
            show(false, err.message);
          })
          .submitNewBooking(form);
      }

      const reservedUntil = document.getElementById('reservedUntil');
      const endDateDiv = document.getElementById('endDateDiv');
      const repeatSelect = document.getElementById('repeat');
      repeatSelect.addEventListener('change', function (e) {
          if (repeatSelect.value !== 'none') {
              endDateDiv.style.display = 'block';
              reservedUntil.style.display = 'none';
          } else {
              endDateDiv.style.display = 'none';
              reservedUntil.style.display = 'block';
          }
      });

      const phoneInput = document.getElementById("phone");
      phoneInput.addEventListener("input", formatPhone);
      function formatPhone(e) {
          let value = e.target.value.replace(/\D/g, "");
          if (!value) {
              e.target.value = "";
              return;
          }
          // Allow only numbers starting with 7 or 8
          if (value[0] !== "7" && value[0] !== "8") {
              value = value.slice(1);
          }
          value = value.slice(0, 11);
          let result = "";
          if (value[0] === "7") {
              result = "+7";
              if (value.length > 1) result += " " + value.slice(1, 4);
              if (value.length > 4) result += " " + value.slice(4, 7);
              if (value.length > 7) result += " " + value.slice(7, 9);
              if (value.length > 9) result += " " + value.slice(9, 11);
          } else if (value[0] === "8") {
              result = "8";
              if (value.length > 1) result += " " + value.slice(1, 4);
              if (value.length > 4) result += " " + value.slice(4, 7);
              if (value.length > 7) result += " " + value.slice(7, 9);
              if (value.length > 9) result += " " + value.slice(9, 11);
          }
          e.target.value = result;
      }
    </script>

  </body>
</html>
