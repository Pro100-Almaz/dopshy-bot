<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .subtitle {
      font-size: 18px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      background: white;
      box-sizing: border-box;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-cancel {
      background: #e5e7eb;
      color: #374151;
    }

    .btn-cancel:hover {
      background: #d1d5db;
    }

    .btn-save {
      background: #2563eb;
      color: white;
    }

    .btn-save:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="">
    <div class="subtitle">
      Выберите новый статус для брони
    </div>

    <select id="newStatus">
      <option value="awaiting_payment">ОЖИДАНИЕ ОПЛАТЫ</option>
      <option value="confirmed">ПОДТВЕРЖДЕНО</option>
      <option value="cancelled">ОТМЕНЕН</option>
    </select>

    <div class="actions">
      <button class="btn-cancel" onclick="google.script.host.close()">
        Отмена
      </button>

      <button class="btn-save" onclick="changeStatus()">
        Сохранить
      </button>
    </div>
  </div>

</body>
<script>
    const status = <?= JSON.stringify(status) ?>;
    const bookingId = <?= JSON.stringify(bookingId) ?>;

    function changeStatus() {
      const value = document.getElementById('newStatus').value;

      google.script.run
        .withSuccessHandler(() => google.script.host.close())
        .withFailureHandler(err => alert(err.message))
        .changeStatusSelected(bookingId, value);
    }
  </script>
</html>
