<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: Arial, sans-serif; font-size: 13px; padding: 8px; }
      label { display: block; margin-top: 10px; font-weight: bold; }
      input, select, textarea { width: 100%; box-sizing: border-box; padding: 5px; margin-top: 3px; }
      button { margin-top: 14px; padding: 8px 14px; cursor: pointer; }
      #msg { margin-top: 12px; padding: 8px; border-radius: 4px; display: none; }
      .ok { background: #e6f4ea; color: #137333; }
      .err { background: #fce8e6; color: #c5221f; }
    </style>
  </head>
  <body>
    <label>Тип Спорта</label>
    <select id="group_type">
      <option value="boxing">Бокс</option>
      <option value="football">Футбол</option>
    </select>

    <label>Название Группы</label>
    <input type='text' id='group_name'>

    <label>День занятия</label>
    <select id="training_day">
      <option value='0'>Понедельник</option>
      <option value='1'>Вторник</option>
      <option value='2'>Среда</option>
      <option value='3'>Четверг</option>
      <option value='4'>Пятница</option>
      <option value='5'>Суббота</option>
      <option value='6'>Воскресенье</option>
    </select>

    <label>Начало</label>
    <input type="time" id="start" step="300">

    <label>Конец</label>
    <input type="time" id="end" step="300">

    <label>Максимальное количество учащихся</label>
    <input type="number" id="max_cap">

    <button id="submit" onclick="submit()">Создать группу</button>
    <div id="msg"></div>

    <script>

      function show(ok, text) {
        var m = document.getElementById('msg');
        m.className = ok ? 'ok' : 'err';
        m.textContent = text;
        m.style.display = 'block';
      }

      function submit() {
        var form = {
          group_type: document.getElementById('group_type').value,
          group_name: document.getElementById('group_name').value,
          training_day: document.getElementById('training_day').value,
          time_start: document.getElementById('start').value,
          time_end: document.getElementById('end').value,
          max_cap: document.getElementById('max_cap').value,

        };
        if (!form.group_type || !form.group_name || !form.training_day || !form.time_start || !form.time_end || !form.max_cap) {
          return show(false, 'Заполните все поля.');
        }
        if (form.time_end <= form.time_start) {
          return show(false, 'Конец должен быть позже начала.');
        }

        document.getElementById('submit').disabled = true;
        google.script.run
          .withSuccessHandler(function (res) {
            document.getElementById('submit').disabled = false;
            show(res.ok, res.message);
          })
          .withFailureHandler(function (err) {
            document.getElementById('submit').disabled = false;
            show(false, err.message);
          })
          .submitNewGrouping(form);
      }
    </script>
  </body>
</html>
